version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    # Always update lock file to prevent npm ci failures
    commit-message:
      prefix: "chore"
      include: "scope"
    # Dependabot will run npm install and commit updated package-lock.json
    allow:
      - dependency-type: "all"
    groups:
      # Patch + minor: auto-merge candidates once CI passes
      dependencies:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      # Major versions: separate PRs, require manual review
      major-dependencies:
        patterns:
          - "*"
        update-types:
          - "major"
    open-pull-requests-limit: 5
